version: '3.8'
services:
  app:
    build: .
    volumes:
      - ./:/var/www/html
    ports:
      - "9000:9000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: loopapi
      MYSQL_USER: loopapi
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
